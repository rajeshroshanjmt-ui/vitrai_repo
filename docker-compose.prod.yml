services:
  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_TLS_CERT_PATH:-./nginx/certs/fullchain.pem}:/etc/nginx/certs/fullchain.pem:ro
      - ${NGINX_TLS_KEY_PATH:-./nginx/certs/privkey.pem}:/etc/nginx/certs/privkey.pem:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.50"

  frontend:
    mem_limit: 512m
    cpus: "0.75"
    security_opt:
      - no-new-privileges:true

  backend:
    environment:
      APP_ENV: production
    mem_limit: 1g
    cpus: "1.00"
    security_opt:
      - no-new-privileges:true

  langgraph:
    ports: []
    mem_limit: 2g
    cpus: "2.00"
    security_opt:
      - no-new-privileges:true

  postgres:
    mem_limit: 1g
    cpus: "1.00"

  redis:
    mem_limit: 512m
    cpus: "0.50"

  qdrant:
    ports: []
    mem_limit: 2g
    cpus: "1.50"

  ollama:
    ports: []
    mem_limit: 8g
    cpus: "4.00"
