name: Fast PR Check

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - master
  workflow_dispatch:

jobs:
  backend-tests:
    uses: ./.github/workflows/backend-tests.yml

  fast-check:
    needs: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose Version
        run: docker compose version

      - name: Start Minimal Stack
        run: docker compose up -d --build nginx frontend backend postgres redis qdrant

      - name: Wait For Backend Health
        shell: bash
        run: |
          for i in {1..120}; do
            if curl -fsS http://localhost/api/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health endpoint did not become ready in time."
          exit 1

      - name: Run Fast API Check
        shell: pwsh
        run: |
          ./scripts/quick_check.ps1

      - name: Run Tenant Isolation Gate
        shell: pwsh
        run: |
          ./scripts/tenant_isolation_check.ps1

      - name: Run Audit Completeness Gate
        shell: pwsh
        run: |
          ./scripts/audit_completeness_check.ps1

      - name: Run SLO Gate
        shell: pwsh
        run: |
          ./scripts/slo_gate_check.ps1

      - name: Capture Compose Logs On Failure
        if: failure()
        shell: bash
        run: docker compose logs --no-color > compose.log

      - name: Upload Logs On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fast-check-compose-logs
          path: compose.log

      - name: Teardown
        if: always()
        run: docker compose down -v
