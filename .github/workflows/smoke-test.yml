name: Full Smoke Test

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backend-tests:
    uses: ./.github/workflows/backend-tests.yml

  docker-smoke:
    needs: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose Version
        run: docker compose version

      - name: Start Stack
        run: docker compose up -d --build

      - name: Wait For Backend Health
        shell: bash
        run: |
          for i in {1..120}; do
            if curl -fsS http://localhost/api/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health endpoint did not become ready in time."
          exit 1

      - name: Pull Ollama Models
        shell: bash
        run: |
          docker exec vetrai-ollama-1 ollama pull llama3.2
          docker exec vetrai-ollama-1 ollama pull nomic-embed-text
          docker exec vetrai-ollama-1 ollama list

      - name: Run End-to-End Smoke Test
        shell: pwsh
        run: |
          ./scripts/smoke_test.ps1

      - name: Capture Compose Logs On Failure
        if: failure()
        shell: bash
        run: docker compose logs --no-color > compose.log

      - name: Upload Logs On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose.log

      - name: Teardown
        if: always()
        run: docker compose down -v
